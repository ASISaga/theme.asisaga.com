# =============================================================================
# UI Chrome — Ontological Knowledge Base (Tier 2)
# =============================================================================
# Purpose: Canonical source for all user-interface chrome strings — labels,
# buttons, accessibility text, navigation headings, and form placeholders.
# Templates MUST reference site.data.ui.* for every visible UI string.
#
# Ontological Context:
#   Category  → synapse (interaction), cognition (labels), state (feedback)
#   Intent    → Guide the user through the interface with clarity and purpose
# =============================================================================

