# Party domain — social gathering conversation
# Schema.org JSON-LD format consumed by chatroom-app.loadDomain()
#
# @type mapping (register in chatroom-sample.js):
#   schema:SocialEvent  → template-party-event
#   schema:HostMessage  → template-party-host-msg
#   schema:GuestMessage → template-party-guest-msg
messages:
  - "@context": "https://schema.org"
    "@type": "schema:SocialEvent"
    name: "Welcome to the Party! 🎉"
    description: "The celebration has started!"

  - "@context": "https://schema.org"
    "@type": "schema:HostMessage"
    sender:
      "@type": "schema:Person"
      name: "DJ Bot"
      identifier: "host"
      icon: "fas fa-music"
    text: "Welcome everyone! Tonight's playlist is curated just for you. Let's get this party started! 🎵"
    dateSent: "8:00 PM"

  - "@context": "https://schema.org"
    "@type": "schema:GuestMessage"
    sender:
      "@type": "schema:Person"
      name: "Alice"
      identifier: "guest-alice"
    text: "This playlist is amazing! Can't wait for the night ahead! 🙌"
    dateSent: "8:02 PM"

  - "@context": "https://schema.org"
    "@type": "schema:GuestMessage"
    sender:
      "@type": "schema:Person"
      name: "Bob"
      identifier: "guest-bob"
    text: "Just arrived! Love the vibe in here. Who's ready to dance? 💃🕺"
    dateSent: "8:05 PM"

  - "@context": "https://schema.org"
    "@type": "schema:SocialEvent"
    name: "🎯 Game Time: Truth or Dare!"
    description: "Up next"

  - "@context": "https://schema.org"
    "@type": "schema:HostMessage"
    sender:
      "@type": "schema:Person"
      name: "DJ Bot"
      identifier: "host"
      icon: "fas fa-gamepad"
    text: "Time for Truth or Dare! First up — Alice, Truth or Dare? 🎯"
    dateSent: "8:15 PM"

  - "@context": "https://schema.org"
    "@type": "schema:GuestMessage"
    sender:
      "@type": "schema:Person"
      name: "Alice"
      identifier: "guest-alice"
    text: "Truth! But nothing too embarrassing please 😅"
    dateSent: "8:16 PM"

  - "@context": "https://schema.org"
    "@type": "schema:HostMessage"
    sender:
      "@type": "schema:Person"
      name: "DJ Bot"
      identifier: "host"
      icon: "fas fa-star"
    text: "Ha! OK — what's the most embarrassing song you know every word to? 🎤"
    dateSent: "8:16 PM"

  - "@context": "https://schema.org"
    "@type": "schema:GuestMessage"
    sender:
      "@type": "schema:Person"
      name: "Alice"
      identifier: "guest-alice"
    text: "...Baby One More Time by Britney Spears. Every. Single. Word. 🫣"
    dateSent: "8:17 PM"

  - "@context": "https://schema.org"
    "@type": "schema:GuestMessage"
    sender:
      "@type": "schema:Person"
      name: "Bob"
      identifier: "guest-bob"
    text: "NO SHAME IN THAT 🎶😂 Best answer ever!"
    dateSent: "8:18 PM"

  - "@context": "https://schema.org"
    "@type": "schema:SocialEvent"
    name: "🥂 Toast Time!"
    description: "Raise your glasses"

  - "@context": "https://schema.org"
    "@type": "schema:HostMessage"
    sender:
      "@type": "schema:Person"
      name: "DJ Bot"
      identifier: "host"
      icon: "fas fa-champagne-glasses"
    text: "Let's raise a glass to great company, great music, and even greater memories. Cheers! 🥂✨"
    dateSent: "8:30 PM"
