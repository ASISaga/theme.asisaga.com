{% comment %}
  Shared chatroom templates — cross-domain MCP / infrastructure defaults
  =======================================================================
  These <template> elements provide generic rendering for the full set of
  Schema.org types encountered in a typical chatroom application, including
  MCP (Model Context Protocol) tool responses and AI agent messages.

  Location: _includes/layouts/chatroom/shared.html
  Included automatically by _layouts/chatroom.html so every page using the
  chatroom layout gets these defaults.

  Registration — call once at startup from the consuming page's JS module:

    chatroom.registerSharedTemplates({
      'AgentMessage':      'template-shared-agent-msg',
      'UserMessage':       'template-shared-user-msg',
      'CommunicateAction': 'template-shared-typing',
      'Message':           'template-shared-system-msg',
      'JoinAction':        'template-shared-join',
      'LeaveAction':       'template-shared-leave',
      'AcknowledgeAction': 'template-shared-acknowledge',
      'InformAction':      'template-shared-inform',
      'ReactAction':       'template-shared-reaction',
      '__agent_message':   'AgentMessage',
      '__user_message':    'UserMessage',
    });

  Domain-specific templates take priority — a domain may override any shared
  type by registering its own template ID for that @type via registerDomain().
  No extra wiring is required; resolution is always domain → shared.

  Template slot attributes (all supported by ChatroomApp._fillFromSchema):

    data-schema="path.to.value"        fills element.textContent + removes [hidden]
                                        when the JSON-LD path resolves to a value
    data-schema-avatar="id.path"        adds chatroom__avatar--<id> CSS modifier
                                        class and sets text initials from the id
    data-schema-avatar-icon="icon.path" when the icon path resolves to a Font
                                        Awesome class string, replaces avatar
                                        content with a <i> icon element
    data-schema-list="path"             renders an array as tool-result-item rows
                                        (using template-chatroom-tool-result-item);
                                        removes [hidden] when array is non-empty
    data-schema-parent-show="path"      removes [hidden] on this element when the
                                        path resolves to a non-null value; used for
                                        conditionally visible badges and labels

  Template inventory (9 types):
    AgentMessage      — AI / agent response with optional MCP tool badge + results
    UserMessage       — outgoing message from the local user
    CommunicateAction — typing / thinking indicator
    Message           — channel-level system notification (announcement, separator)
    JoinAction        — participant joined the conversation
    LeaveAction       — participant left the conversation
    AcknowledgeAction — confirmation notice (MCP tool success, board resolution)
    InformAction      — alert / important notification banner
    ReactAction       — emoji reaction from a participant
{% endcomment %}

{% comment %} ── AgentMessage ─────────────────────────────────────────────────
  Renders an AI or named-agent response.  Supports:
    • sender avatar (identifier → CSS class, icon → Font Awesome override)
    • author name, job title, and timestamp in the message meta header
    • optional tool badge — visible only when the JSON-LD includes a "tool" key
    • body text paragraph
    • optional MCP tool-result list — visible only when toolResults is non-empty
{% endcomment %}
<template id="template-shared-agent-msg">
  <div class="chatroom__message chatroom__message--ai">
    <div class="chatroom__message-row">
      <span class="chatroom__avatar"
            data-schema-avatar="sender.identifier"
            data-schema-avatar-icon="sender.icon"
            aria-hidden="true"></span>
      <div class="chatroom__message-body">
        <header class="chatroom__message-meta">
          <strong class="chatroom__author" data-schema="sender.name" hidden></strong>
          <span class="chatroom__agent-role" data-schema="sender.jobTitle" hidden></span>
          <time class="chatroom__time" data-schema="dateSent" hidden></time>
          <span class="chatroom__tool-badge" title="Tool invoked"
                data-schema-parent-show="tool" hidden>
            <i class="fas fa-wrench" aria-hidden="true"></i>
            <span class="chatroom__tool-badge-text" data-schema="tool"></span>
          </span>
        </header>
        <p class="chatroom__text" data-schema="text"></p>
        <ul class="chatroom__tool-results" data-schema-list="toolResults" hidden></ul>
      </div>
    </div>
  </div>
</template>

{% comment %} ── UserMessage ──────────────────────────────────────────────────
  Renders an outgoing message from the local user, aligned to the right.
  Shows sender name and timestamp in the meta header when present.
{% endcomment %}
<template id="template-shared-user-msg">
  <div class="chatroom__message chatroom__message--own">
    <div class="chatroom__message-row">
      <div class="chatroom__message-body">
        <header class="chatroom__message-meta">
          <strong class="chatroom__author" data-schema="sender.name" hidden></strong>
          <time class="chatroom__time" data-schema="dateSent" hidden></time>
        </header>
        <p class="chatroom__text" data-schema="text"></p>
      </div>
      <span class="chatroom__avatar chatroom__avatar--you" aria-hidden="true">You</span>
    </div>
  </div>
</template>

{% comment %} ── CommunicateAction ─────────────────────────────────────────────
  Renders a typing / deliberating indicator for a named agent.
  Uses data-schema-avatar to apply the agent's identifier CSS class.
  The description field provides the visible status text
  (e.g. "Chief Executive Officer is deliberating…").
{% endcomment %}
<template id="template-shared-typing">
  <div class="chatroom__typing">
    <span class="chatroom__avatar"
          data-schema-avatar="agent.identifier"
          aria-hidden="true"></span>
    <em class="chatroom__typing-text" data-schema="description"></em>
  </div>
</template>

{% comment %} ── Message (system / channel notification) ───────────────────────
  Renders a centred channel-level notification such as a date separator,
  meeting title banner, or system announcement.  No sender avatar.
  Maps: text → notification text, dateSent → optional timestamp.
{% endcomment %}
<template id="template-shared-system-msg">
  <div class="chatroom__system-message" role="status" aria-live="polite">
    <span class="chatroom__system-text" data-schema="text" hidden></span>
    <time class="chatroom__time chatroom__system-time" data-schema="dateSent" hidden></time>
  </div>
</template>

{% comment %} ── JoinAction ────────────────────────────────────────────────────
  Renders a compact inline notification when a participant joins.
  Maps: agent.identifier → avatar CSS class, agent.name → name label,
        dateSent → optional timestamp.
  The static " joined" text is always visible; only name + time need binding.
{% endcomment %}
<template id="template-shared-join">
  <div class="chatroom__notification chatroom__notification--join" role="status"
       aria-live="polite">
    <span class="chatroom__avatar chatroom__avatar--xs"
          data-schema-avatar="agent.identifier"
          aria-hidden="true"></span>
    <span class="chatroom__notification-name" data-schema="agent.name" hidden></span>
    <span class="chatroom__notification-action"> joined</span>
    <time class="chatroom__time chatroom__notification-time"
          data-schema="dateSent" hidden></time>
  </div>
</template>

{% comment %} ── LeaveAction ───────────────────────────────────────────────────
  Renders a compact inline notification when a participant leaves.
  Maps: agent.identifier → avatar CSS class, agent.name → name label,
        dateSent → optional timestamp.
{% endcomment %}
<template id="template-shared-leave">
  <div class="chatroom__notification chatroom__notification--leave" role="status"
       aria-live="polite">
    <span class="chatroom__avatar chatroom__avatar--xs"
          data-schema-avatar="agent.identifier"
          aria-hidden="true"></span>
    <span class="chatroom__notification-name" data-schema="agent.name" hidden></span>
    <span class="chatroom__notification-action"> left the conversation</span>
    <time class="chatroom__time chatroom__notification-time"
          data-schema="dateSent" hidden></time>
  </div>
</template>

{% comment %} ── AcknowledgeAction ─────────────────────────────────────────────
  Renders a confirmation / success notice, e.g. "Minutes recorded" or an MCP
  tool success acknowledgement.  Shows a small avatar for the agent that
  confirmed the action, plus the description and an optional timestamp.
  Maps: agent.identifier → avatar class, agent.icon → Font Awesome icon,
        description → confirmation text, dateSent → timestamp.
{% endcomment %}
<template id="template-shared-acknowledge">
  <div class="chatroom__notification chatroom__notification--success" role="status"
       aria-live="polite">
    <span class="chatroom__avatar chatroom__avatar--xs"
          data-schema-avatar="agent.identifier"
          data-schema-avatar-icon="agent.icon"
          aria-hidden="true"></span>
    <em class="chatroom__notification-text" data-schema="description" hidden></em>
    <time class="chatroom__time chatroom__notification-time"
          data-schema="dateSent" hidden></time>
  </div>
</template>

{% comment %} ── InformAction ──────────────────────────────────────────────────
  Renders an important alert / information banner across the full message
  stream width.  Use for MCP tool errors, connectivity warnings, or any
  notice that requires user attention.
  Maps: description → alert text, dateSent → optional timestamp.
{% endcomment %}
<template id="template-shared-inform">
  <div class="chatroom__alert" role="alert" aria-live="assertive">
    <i class="fas fa-circle-info chatroom__alert-icon" aria-hidden="true"></i>
    <span class="chatroom__alert-text" data-schema="description" hidden></span>
    <time class="chatroom__time chatroom__alert-time" data-schema="dateSent" hidden></time>
  </div>
</template>

{% comment %} ── ReactAction ───────────────────────────────────────────────────
  Renders an emoji reaction from a participant as a small inline bubble.
  Maps: agent.identifier → avatar CSS class, agent.name → hidden label for
        accessibility, emoji → the emoji character.
  Domain-specific templates may override this with more elaborate styling
  while keeping the same data-schema bindings.
{% endcomment %}
<template id="template-shared-reaction">
  <div class="chatroom__reaction">
    <span class="chatroom__avatar chatroom__avatar--xs"
          data-schema-avatar="agent.identifier"
          aria-hidden="true"></span>
    <span class="chatroom__reaction-emoji" data-schema="emoji" hidden></span>
    <span class="chatroom__reaction-author chatroom__sr-only" data-schema="agent.name" hidden></span>
  </div>
</template>
