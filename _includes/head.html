<head>
  <!-- Genesis Theme v2.0 - Modern Semantic Design System -->
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="color-scheme" content="dark light">

  <!-- Early theme init — prevents flash of wrong theme colour -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('genesis-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      } catch (_) {}
    })();
  </script>

  <!-- Main stylesheet (served once per site; cached across all pages) -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">

  <!-- Favicon and device icons -->
  <link id="favicon" rel="icon" type="image/x-icon" href="{{ '/assets/images/favicon.ico' | relative_url }}">

  <!-- Page Title -->
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

  <!-- Jekyll SEO tag plugin -->
  {% seo %}

  <!-- Import map: resolve bare module specifiers for ES module imports -->
  <script type="importmap">
  {
    "imports": {
      "lit": "https://esm.sh/lit@3",
      "lit/": "https://esm.sh/lit@3/"
    }
  }
  </script>

  <!-- Motion Library (required for animations) -->
  {% include motion-library.html %}

  <!-- Genesis Theme JavaScript -->
  <script type="module" src="{{ '/assets/js/common.js' | relative_url }}"></script>

  <!-- Page-specific JavaScript -->
  {% if page.custom_js %}
  <script src="{{ '/assets/js/' | append: page.custom_js | relative_url }}" defer></script>
  {% endif %}
  {% assign _module_js = page.module_js | default: layout.module_js %}
  {% if _module_js %}
  <script type="module" src="{{ '/assets/js/' | append: _module_js | escape | relative_url }}"></script>
  {% endif %}
</head>
