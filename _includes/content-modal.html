{% comment %}
Content Modal Component
Reusable modal dialog populated dynamically via JavaScript
Content sourced from: _data/ui.yml for chrome strings
No parameters needed - body content injected via JavaScript
{% endcomment %}

{% assign _ui = site.data.ui %}

<div class="modal" id="contentModal" tabindex="-1" role="dialog" aria-labelledby="contentModalLabel" aria-hidden="true">
  <div class="modal__dialog" role="document">
    <div class="modal__content">
      <header class="modal__header">
        <h2 class="modal__title" id="contentModalLabel"></h2>
        <button type="button" class="modal__close" data-modal-dismiss aria-label="{{ _ui.actions.close }}"></button>
      </header>
      
      <div class="modal__body">
        <!-- Content injected via JavaScript -->
      </div>
      
      <div class="modal__footer">
        <button type="button" class="modal__button" data-modal-dismiss>{{ _ui.actions.close }}</button>
      </div>
    </div>
  </div>
</div>
