<!DOCTYPE html>
<html lang="{{ site.data.site.identity.lang | default: site.lang | default: 'en-US' }}">
  {% include head.html %}
  
  {% assign _body_class = page.body_class | default: layout.body_class %}
  <body class="genesis-body{% if _body_class %} {{ _body_class | escape }}{% endif %}">
    <!-- Skip link (REQUIRED - WCAG AA) -->
    <a href="#skip-target" class="skip-link sr-only focus-visible">{{ site.data.ui.a11y.skip_link }}</a>
    
    <!-- Site Header -->
    {% include header.html %}
    
    <!-- Main Content Area (REQUIRED landmark) -->
    
      {% assign _main_class = page.main_class | default: layout.main_class %}
      <main id="skip-target" tabindex="-1" class="genesis-main{% if _main_class %} {{ _main_class | escape }}{% endif %}">
        {{ content }}
      </main>
    
    
    <!-- Site Footer -->
    {% include footer.html %}
    
    <!-- Ambient Background Effects -->
    <div class="genesis-ambient" aria-hidden="true">
      <div class="genesis-ambient__particles"></div>
      <div class="genesis-ambient__glow"></div>
    </div>
  </body>
</html>
